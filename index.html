<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDF Viewer</title>
    <link data-trunk rel="css" href="styles/main.css" />
    <link data-trunk rel="css" href="styles/themes.css" />
    <link data-trunk rel="css" href="styles/toolbar.css" />
    <link data-trunk rel="css" href="styles/notes.css" />
    <link data-trunk rel="css" href="styles/pdf.css" />
    <script type="module">
        import * as pdfjsLib from "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.9.155/pdf.min.mjs";

        pdfjsLib.GlobalWorkerOptions.workerSrc =
            "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.9.155/pdf.worker.min.mjs";

        let currentPdf = null;
        let currentPage = null;

        window.pdfBridge = {
            async loadPdfFromUrl(url) {
                const loadingTask = pdfjsLib.getDocument(url);
                currentPdf = await loadingTask.promise;
                return currentPdf.numPages;
            },

            async loadPdfFromData(data) {
                const loadingTask = pdfjsLib.getDocument({ data });
                currentPdf = await loadingTask.promise;
                return currentPdf.numPages;
            },

            async renderPage(pageNum, canvasId, scale) {
                if (!currentPdf) return { width: 0, height: 0 };

                const page = await currentPdf.getPage(pageNum);
                currentPage = page;
                const viewport = page.getViewport({ scale });

                const canvas = document.getElementById(canvasId);
                if (!canvas) return { width: 0, height: 0 };

                const context = canvas.getContext("2d");
                canvas.width = viewport.width;
                canvas.height = viewport.height;

                const renderContext = {
                    canvasContext: context,
                    viewport: viewport,
                };

                await page.render(renderContext).promise;
                return { width: viewport.width, height: viewport.height };
            },

            getNumPages() {
                return currentPdf ? currentPdf.numPages : 0;
            },

            isLoaded() {
                return currentPdf !== null;
            },

            async computeHash(data) {
                const hashBuffer = await crypto.subtle.digest("SHA-256", data);
                const hashArray = Array.from(new Uint8Array(hashBuffer));
                return hashArray.map((b) => b.toString(16).padStart(2, "0")).join("");
            },
        };
    </script>
    <link data-trunk rel="rust" data-wasm-opt="z" />
</head>
<body>
</body>
</html>
